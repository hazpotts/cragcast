name = "cragcast-cache-warmer"
main = "src/index.ts"
compatibility_date = "2024-09-19"

# Cron triggers:
# - Every 2 hours: cache warming
# - Monday 03:00 UTC: weekly crag import from OpenBeta
[triggers]
crons = ["0 */2 * * *", "0 3 * * 1"]

[vars]
CRAGCAST_URL = "https://cragcast.app"
# ADMIN_API_KEY should be set as a secret, not in vars:
#   npx wrangler secret put ADMIN_API_KEY --name cragcast-cache-warmer
